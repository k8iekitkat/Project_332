<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Database Project</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .container {
            padding: 20px;
            padding-bottom: 80px;
        }

        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }

        table {
            border-collapse: collapse;
            margin-top: 15px;
            background-color: white;
        }

        th, td {
            border: 1px solid #999;
            padding: 8px;
        }
    </style>
</head>
<body>

    <header>
        <h1>University Database System</h1>
        <p>Welcome to the project homepage</p>
    </header>

    <nav>
        <a href="#" onclick="showHome()">Home</a>
        <a href="#" onclick="showProfessors()">Professors</a>
        <a href="#" onclick="showStudents()">Students</a>
        <a href="#" onclick="showCourses()">Courses</a>
    </nav>

    <div class="container" id="content">
        <h2>Home</h2>
        <p>This is the main page of the database application.</p>
        <p>You will build interfaces here to query and display data.</p>
    </div>

    <footer>
        <p>&copy; 2026 CPSC 332 Project</p>
    </footer>

    <script>
        function showHome() {
            document.getElementById("content").innerHTML = `
                <h2>Home</h2>
                <p>This is the main page of the database application.</p>
                <p>You will build interfaces here to query and display data.</p>
            `;
        }

        function showProfessors() {
            document.getElementById("content").innerHTML = `
                <h2>Professors</h2>

                <p>Given the social security number of a professor, list the titles, classrooms, meeting days, and times of their classes.</p>
                <input id="professorSsn" type="text" placeholder="Professor SSN">
                <button onclick="getProfessorClasses()">Search</button>

                <br><br>

                <p>Given a course number and section number, count how many students received each grade.</p>
                <input id="gradeCourseNum" type="text" placeholder="Course Number">
                <input id="gradeSectionNum" type="text" placeholder="Section Number">
                <button onclick="getGradeCounts()">Search</button>

                <div id="results"></div>
            `;
        }

        function showStudents() {
            document.getElementById("content").innerHTML = `
                <h2>Students</h2>

                <p>Given a course number, list the sections, classrooms, meeting days, times, and number of enrolled students.</p>
                <input id="sectionCourseNum" type="text" placeholder="Course Number">
                <button onclick="getCourseSections()">Search</button>

                <br><br>

                <p>Given a campus wide ID, list all courses the student took and their grades.</p>
                <input id="studentCwid" type="text" placeholder="Student CWID">
                <button onclick="getStudentCourses()">Search</button>

                <div id="results"></div>
            `;
        }

        function showCourses() {
            document.getElementById("content").innerHTML = `
                <h2>Courses</h2>
                <p>Course-related queries are included under the Professors and Students sections.</p>
            `;
        }

        async function getProfessorClasses() {
            const ssn = document.getElementById("professorSsn").value;
            const response = await fetch(`/api/professor-classes?ssn=${ssn}`);
            const data = await response.json();
            showResults(data);
        }

        async function getGradeCounts() {
            const courseNum = document.getElementById("gradeCourseNum").value;
            const sectionNum = document.getElementById("gradeSectionNum").value;
            const response = await fetch(`/api/grade-counts?courseNum=${courseNum}&sectionNum=${sectionNum}`);
            const data = await response.json();
            showResults(data);
        }

        async function getCourseSections() {
            const courseNum = document.getElementById("sectionCourseNum").value;
            const response = await fetch(`/api/course-sections?courseNum=${courseNum}`);
            const data = await response.json();
            showResults(data);
        }

        async function getStudentCourses() {
            const cwid = document.getElementById("studentCwid").value;
            const response = await fetch(`/api/student-courses?cwid=${cwid}`);
            const data = await response.json();
            showResults(data);
        }

        function showResults(data) {
            const results = document.getElementById("results");

            if (!data || data.length === 0) {
                results.innerHTML = "<p>No results found.</p>";
                return;
            }

            const columns = Object.keys(data[0]);

            let html = "<table><tr>";

            columns.forEach(column => {
                html += `<th>${column}</th>`;
            });

            html += "</tr>";

            data.forEach(row => {
                html += "<tr>";

                columns.forEach(column => {
                    html += `<td>${row[column] ?? ""}</td>`;
                });

                html += "</tr>";
            });

            html += "</table>";

            results.innerHTML = html;
        }
    </script>

</body>
</html>
